<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Controle de Gastos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9e9e9a;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --radius: 10px;
    --radius-lg: 14px;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --green-dark: #0F6E56;
    --red: #D85A30;
    --red-bg: #FAECE7;
    --red-dark: #993C1D;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #232326;
      --surface2: #2c2c30;
      --text: #f0efe8;
      --text2: #a0a09a;
      --text3: #68686a;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.20);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* HEADER */
  .topbar { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 600; }
  .topbar-brand i { font-size: 22px; color: var(--green); }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button { background: none; border: 0.5px solid var(--border2); border-radius: 8px; width: 30px; height: 30px; cursor: pointer; color: var(--text2); font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .month-nav button:hover { background: var(--surface2); }
  .month-nav span { font-size: 14px; font-weight: 500; min-width: 130px; text-align: center; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 340px 1fr; gap: 0; min-height: calc(100vh - 56px); }
  .sidebar { background: var(--surface); border-right: 0.5px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .main { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }

  /* CARDS */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 1rem; }
  .card .label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .card .value { font-size: 20px; font-weight: 600; }
  .card.receita .value { color: var(--green); }
  .card.despesa .value { color: var(--red); }

  /* PROGRESS */
  .orcamento-box { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 1rem; }
  .orcamento-box .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 8px; }
  .orcamento-box .row strong { font-size: 15px; }
  .bar-wrap { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 8px; border-radius: 99px; transition: width 0.4s, background 0.3s; }

  /* SECTION TITLE */
  .sec-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 10px; }

  /* FORM */
  .tipo-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .tipo-btn { height: 36px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: none; cursor: pointer; font-size: 13px; font-family: var(--font); color: var(--text2); display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.15s; }
  .tipo-btn.active.despesa { background: var(--red-bg); border-color: var(--red); color: var(--red-dark); }
  .tipo-btn.active.receita { background: var(--green-bg); border-color: var(--green); color: var(--green-dark); }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-group input, .form-group select { height: 38px; padding: 0 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 14px; font-family: var(--font); outline: none; width: 100%; }
  .form-group input:focus, .form-group select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
  .form-row { display: grid; gap: 10px; }
  .form-row.two { grid-template-columns: 1fr 1fr; }
  .btn-add { width: 100%; height: 40px; background: var(--green); border: none; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-family: var(--font); color: #fff; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
  .btn-add:hover { background: var(--green-dark); }

  /* TABS */
  .tabs { display: flex; gap: 6px; }
  .tab { padding: 6px 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: none; cursor: pointer; font-size: 13px; font-family: var(--font); color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* FILTERS */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-row select { height: 32px; padding: 0 10px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text2); font-family: var(--font); outline: none; cursor: pointer; }

  /* LISTA */
  .lista { display: flex; flex-direction: column; gap: 6px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); transition: border-color 0.15s; }
  .item:hover { border-color: var(--border2); }
  .item-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-info .name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-info .sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .item-val { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .item-val.rec { color: var(--green); }
  .item-val.des { color: var(--red); }
  .item-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 17px; padding: 3px; border-radius: 6px; display: flex; align-items: center; }
  .item-del:hover { color: var(--red); background: var(--red-bg); }
  .empty { text-align: center; padding: 3rem 0; color: var(--text3); }
  .empty i { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.3; }

  /* GRAFICOS */
  .chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
  .chart-wrap { position: relative; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* RESUMO CATEGORIAS */
  .cat-grid { display: flex; flex-direction: column; gap: 8px; }
  .cat-row { display: flex; align-items: center; gap: 10px; }
  .cat-name { font-size: 13px; flex: 1; color: var(--text); }
  .cat-bar-wrap { flex: 2; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .cat-bar { height: 6px; border-radius: 99px; }
  .cat-val { font-size: 12px; color: var(--text2); min-width: 80px; text-align: right; }

  /* MOBILE */
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 0.5px solid var(--border); }
    .cards { grid-template-columns: 1fr 1fr; }
    .cards .card.saldo { grid-column: span 2; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <i class="ti ti-wallet"></i>
    Controle de Gastos
  </div>
  <div class="month-nav">
    <button onclick="mudarMes(-1)" title="Mês anterior"><i class="ti ti-chevron-left"></i></button>
    <span id="mesAtual"></span>
    <button onclick="mudarMes(1)" title="Próximo mês"><i class="ti ti-chevron-right"></i></button>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR: FORMULÁRIO -->
  <aside class="sidebar">
    <div>
      <div class="sec-title">Novo lançamento</div>
      <div class="tipo-toggle">
        <button class="tipo-btn despesa active" id="btnDespesa" onclick="setTipo('despesa')">
          <i class="ti ti-minus"></i> Despesa
        </button>
        <button class="tipo-btn receita" id="btnReceita" onclick="setTipo('receita')">
          <i class="ti ti-plus"></i> Receita
        </button>
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <input type="text" id="inputDesc" placeholder="Ex: Aluguel, Salário..." />
      </div>
      <div class="form-row two">
        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="number" id="inputValor" placeholder="0,00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="inputData" />
        </div>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="inputCat"></select>
      </div>
      <div class="form-group">
        <label>Forma de pagamento</label>
        <select id="inputPag">
          <option value="Dinheiro">💵 Dinheiro</option>
          <option value="Débito">💳 Débito</option>
          <option value="Crédito">💳 Crédito</option>
          <option value="Pix">⚡ Pix</option>
          <option value="Transferência">🏦 Transferência</option>
        </select>
      </div>
      <div class="form-group">
        <label>Observação (opcional)</label>
        <input type="text" id="inputObs" placeholder="Parcela 1/3, recorrente..." />
      </div>
      <button class="btn-add" onclick="adicionarLancamento()">
        <i class="ti ti-plus"></i> Adicionar lançamento
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- CARDS RESUMO -->
    <div class="cards">
      <div class="card receita">
        <div class="label"><i class="ti ti-trending-up"></i> Receitas</div>
        <div class="value" id="totalReceita">R$ 0,00</div>
      </div>
      <div class="card despesa">
        <div class="label"><i class="ti ti-trending-down"></i> Despesas</div>
        <div class="value" id="totalDespesa">R$ 0,00</div>
      </div>
      <div class="card saldo">
        <div class="label"><i class="ti ti-scale"></i> Saldo</div>
        <div class="value" id="totalSaldo" style="color:var(--text)">R$ 0,00</div>
      </div>
    </div>

    <!-- BARRA ORÇAMENTO -->
    <div class="orcamento-box" id="orcBox" style="display:none">
      <div class="row">
        <span style="color:var(--text2); font-size:13px">Comprometimento da renda</span>
        <strong id="orcPct">0%</strong>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" id="orcBar" style="width:0%"></div>
      </div>
    </div>

    <!-- TABS -->
    <div>
      <div class="tabs" style="margin-bottom:14px;">
        <button class="tab active" id="tabLancamentos" onclick="setTab('lancamentos')">
          <i class="ti ti-list"></i> Lançamentos
        </button>
        <button class="tab" id="tabGraficos" onclick="setTab('graficos')">
          <i class="ti ti-chart-pie"></i> Gráficos
        </button>
        <button class="tab" id="tabCategorias" onclick="setTab('categorias')">
          <i class="ti ti-category"></i> Categorias
        </button>
      </div>

      <!-- VIEW: LANÇAMENTOS -->
      <div id="viewLancamentos">
        <div class="filter-row" style="margin-bottom:12px;">
          <select id="filtroCat" onchange="renderLista()">
            <option value="">Todas categorias</option>
          </select>
          <select id="filtroTipo" onchange="renderLista()">
            <option value="">Todos</option>
            <option value="receita">Receitas</option>
            <option value="despesa">Despesas</option>
          </select>
          <select id="filtroOrdem" onchange="renderLista()">
            <option value="data_desc">Mais recentes</option>
            <option value="data_asc">Mais antigos</option>
            <option value="valor_desc">Maior valor</option>
            <option value="valor_asc">Menor valor</option>
          </select>
        </div>
        <div class="lista" id="listaItems"></div>
      </div>

      <!-- VIEW: GRÁFICOS -->
      <div id="viewGraficos" style="display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div class="chart-card">
            <div class="sec-title">Despesas por categoria</div>
            <div class="chart-wrap" style="height:200px;">
              <canvas id="chartPizza" role="img" aria-label="Pizza de despesas por categoria"></canvas>
            </div>
            <div class="legend" id="legendaPizza"></div>
          </div>
          <div class="chart-card">
            <div class="sec-title">Receitas vs Despesas — 6 meses</div>
            <div class="chart-wrap" style="height:200px;">
              <canvas id="chartBarras" role="img" aria-label="Barras comparando receitas e despesas por mês"></canvas>
            </div>
            <div class="legend">
              <div class="legend-item"><div class="legend-dot" style="background:#5DCAA5"></div>Receitas</div>
              <div class="legend-item"><div class="legend-dot" style="background:#F0997B"></div>Despesas</div>
            </div>
          </div>
        </div>
        <div class="chart-card" style="margin-top:14px;">
          <div class="sec-title">Evolução do saldo — 6 meses</div>
          <div class="chart-wrap" style="height:160px;">
            <canvas id="chartLinha" role="img" aria-label="Linha do saldo por mês"></canvas>
          </div>
        </div>
      </div>

      <!-- VIEW: CATEGORIAS -->
      <div id="viewCategorias" style="display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div class="chart-card">
            <div class="sec-title" style="margin-bottom:14px;">Despesas por categoria</div>
            <div class="cat-grid" id="catGridDespesa"></div>
          </div>
          <div class="chart-card">
            <div class="sec-title" style="margin-bottom:14px;">Receitas por categoria</div>
            <div class="cat-grid" id="catGridReceita"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const CATS_DESPESA = ['Moradia','Alimentação','Transporte','Saúde','Lazer','Educação','Vestuário','Assinaturas','Outros'];
const CATS_RECEITA = ['Salário','Freelance','Investimentos','Presente','Outros'];
const CORES = {
  'Moradia':'#3266ad','Alimentação':'#1D9E75','Transporte':'#BA7517',
  'Saúde':'#D85A30','Lazer':'#7F77DD','Educação':'#073b8f',
  'Vestuário':'#D4537E','Assinaturas':'#5F5E5A','Salário':'#0F6E56',
  'Freelance':'#639922','Investimentos':'#185FA5','Presente':'#D4537E','Outros':'#888780'
};
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES_CURTO = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

let tipoAtual = 'despesa';
let mesOffset = 0;
let chartPizzaI = null, chartBarrasI = null, chartLinhaI = null;

function fmtMoeda(v) {
  return 'R$ ' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function getMesAno(offset=0) {
  const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+offset);
  return { mes:d.getMonth(), ano:d.getFullYear(), key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` };
}
function getLancamentos() {
  try { return JSON.parse(localStorage.getItem('gastos_v2')||'[]'); } catch { return []; }
}
function salvar(arr) { localStorage.setItem('gastos_v2', JSON.stringify(arr)); }

function preencherFiltrosCat() {
  const allCats = [...CATS_DESPESA, ...CATS_RECEITA.filter(c=>c!=='Outros')];
  const el = document.getElementById('filtroCat');
  el.innerHTML = '<option value="">Todas categorias</option>' + allCats.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function setTipo(t) {
  tipoAtual = t;
  document.getElementById('btnDespesa').className = 'tipo-btn despesa'+(t==='despesa'?' active':'');
  document.getElementById('btnReceita').className = 'tipo-btn receita'+(t==='receita'?' active':'');
  const cats = t==='receita' ? CATS_RECEITA : CATS_DESPESA;
  document.getElementById('inputCat').innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
}

function mudarMes(d) { mesOffset+=d; atualizarTudo(); }

function adicionarLancamento() {
  const desc = document.getElementById('inputDesc').value.trim();
  const valor = parseFloat(document.getElementById('inputValor').value);
  const data = document.getElementById('inputData').value;
  const cat = document.getElementById('inputCat').value;
  const pag = document.getElementById('inputPag').value;
  const obs = document.getElementById('inputObs').value.trim();
  if (!desc||isNaN(valor)||valor<=0||!data) { alert('Preencha descrição, valor e data.'); return; }
  const arr = getLancamentos();
  arr.unshift({id:Date.now(), desc, valor:parseFloat(valor.toFixed(2)), data, cat, pag, obs, tipo:tipoAtual});
  salvar(arr);
  document.getElementById('inputDesc').value='';
  document.getElementById('inputValor').value='';
  document.getElementById('inputObs').value='';
  atualizarTudo();
}

function remover(id) {
  if (!confirm('Remover este lançamento?')) return;
  salvar(getLancamentos().filter(l=>l.id!==id));
  atualizarTudo();
}

function atualizarTudo() {
  const {mes,ano,key} = getMesAno(mesOffset);
  document.getElementById('mesAtual').textContent = MESES[mes]+' '+ano;
  const items = getLancamentos().filter(l=>l.data&&l.data.startsWith(key));
  const rec = items.filter(l=>l.tipo==='receita').reduce((s,l)=>s+l.valor,0);
  const des = items.filter(l=>l.tipo==='despesa').reduce((s,l)=>s+l.valor,0);
  const sal = rec-des;
  document.getElementById('totalReceita').textContent = fmtMoeda(rec);
  document.getElementById('totalDespesa').textContent = fmtMoeda(des);
  const se = document.getElementById('totalSaldo');
  se.textContent = (sal>=0?'+':'-')+' '+fmtMoeda(sal);
  se.style.color = sal>=0?'var(--green)':'var(--red)';
  if (rec>0) {
    const pct = Math.min(100,Math.round(des/rec*100));
    document.getElementById('orcBox').style.display='';
    document.getElementById('orcPct').textContent=pct+'%';
    const bar=document.getElementById('orcBar');
    bar.style.width=pct+'%';
    bar.style.background=pct>90?'var(--red)':pct>70?'#BA7517':'var(--green)';
  } else { document.getElementById('orcBox').style.display='none'; }
  renderLista();
  const tab = document.querySelector('.tab.active')?.id;
  if (tab==='tabGraficos') renderGraficos();
  if (tab==='tabCategorias') renderCategorias();
}

function renderLista() {
  const {key}=getMesAno(mesOffset);
  const filCat=document.getElementById('filtroCat').value;
  const filTipo=document.getElementById('filtroTipo').value;
  const filOrdem=document.getElementById('filtroOrdem').value;
  let items=getLancamentos().filter(l=>l.data&&l.data.startsWith(key));
  if(filCat) items=items.filter(l=>l.cat===filCat);
  if(filTipo) items=items.filter(l=>l.tipo===filTipo);
  if(filOrdem==='data_asc') items.sort((a,b)=>a.data.localeCompare(b.data));
  else if(filOrdem==='data_desc') items.sort((a,b)=>b.data.localeCompare(a.data));
  else if(filOrdem==='valor_desc') items.sort((a,b)=>b.valor-a.valor);
  else if(filOrdem==='valor_asc') items.sort((a,b)=>a.valor-b.valor);
  const el=document.getElementById('listaItems');
  if(!items.length){el.innerHTML='<div class="empty"><i class="ti ti-inbox"></i>Nenhum lançamento neste mês</div>';return;}
  el.innerHTML=items.map(l=>`
    <div class="item">
      <div class="item-dot" style="background:${CORES[l.cat]||'#888'}"></div>
      <div class="item-info">
        <div class="name">${l.desc}</div>
        <div class="sub">${l.cat} · ${l.pag} · ${l.data.split('-').reverse().join('/')}${l.obs?' · '+l.obs:''}</div>
      </div>
      <div class="item-val ${l.tipo==='receita'?'rec':'des'}">${l.tipo==='receita'?'+':'-'} ${fmtMoeda(l.valor)}</div>
      <button class="item-del" onclick="remover(${l.id})" title="Remover"><i class="ti ti-trash"></i></button>
    </div>
  `).join('');
}

function setTab(t) {
  ['lancamentos','graficos','categorias'].forEach(x=>{
    document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1)).className='tab'+(t===x?' active':'');
    document.getElementById('view'+x.charAt(0).toUpperCase()+x.slice(1)).style.display=t===x?'':'none';
  });
  if(t==='graficos') renderGraficos();
  if(t==='categorias') renderCategorias();
}

function renderGraficos() {
  const {key}=getMesAno(mesOffset);
  const todos=getLancamentos();
  const desMes=todos.filter(l=>l.data&&l.data.startsWith(key)&&l.tipo==='despesa');
  const porCat={};
  desMes.forEach(l=>{porCat[l.cat]=(porCat[l.cat]||0)+l.valor;});
  const labPizza=Object.keys(porCat);
  const valPizza=labPizza.map(c=>parseFloat(porCat[c].toFixed(2)));
  const coresPizza=labPizza.map(c=>CORES[c]||'#888');
  if(chartPizzaI) chartPizzaI.destroy();
  if(labPizza.length){
    chartPizzaI=new Chart(document.getElementById('chartPizza'),{
      type:'doughnut',
      data:{labels:labPizza,datasets:[{data:valPizza,backgroundColor:coresPizza,borderWidth:2,borderColor:'transparent'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'58%'}
    });
    const total=valPizza.reduce((a,b)=>a+b,0);
    document.getElementById('legendaPizza').innerHTML=labPizza.map((l,i)=>
      `<div class="legend-item"><div class="legend-dot" style="background:${coresPizza[i]}"></div>${l} ${Math.round(valPizza[i]/total*100)}%</div>`
    ).join('');
  } else {
    document.getElementById('legendaPizza').innerHTML='<span style="font-size:13px;color:var(--text3)">Sem despesas</span>';
  }
  const meses6=Array.from({length:6},(_,i)=>getMesAno(mesOffset-5+i));
  const labM=meses6.map(m=>MESES_CURTO[m.mes]);
  const recM=meses6.map(m=>parseFloat(todos.filter(l=>l.tipo==='receita'&&l.data&&l.data.startsWith(m.key)).reduce((s,l)=>s+l.valor,0).toFixed(2)));
  const desM=meses6.map(m=>parseFloat(todos.filter(l=>l.tipo==='despesa'&&l.data&&l.data.startsWith(m.key)).reduce((s,l)=>s+l.valor,0).toFixed(2)));
  const salM=recM.map((r,i)=>parseFloat((r-desM[i]).toFixed(2)));
  if(chartBarrasI) chartBarrasI.destroy();
  chartBarrasI=new Chart(document.getElementById('chartBarras'),{
    type:'bar',
    data:{labels:labM,datasets:[
      {label:'Receitas',data:recM,backgroundColor:'#5DCAA5',borderRadius:4},
      {label:'Despesas',data:desM,backgroundColor:'#F0997B',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(120,120,120,0.08)'},ticks:{callback:v=>'R$'+v.toLocaleString('pt-BR'),font:{size:10}}}}}
  });
  if(chartLinhaI) chartLinhaI.destroy();
  chartLinhaI=new Chart(document.getElementById('chartLinha'),{
    type:'line',
    data:{labels:labM,datasets:[{
      label:'Saldo',data:salM,borderColor:'#7F77DD',backgroundColor:'rgba(127,119,221,0.1)',
      fill:true,tension:0.4,pointBackgroundColor:'#7F77DD',pointRadius:4
    }]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(120,120,120,0.08)'},ticks:{callback:v=>'R$'+v.toLocaleString('pt-BR'),font:{size:10}}}}}
  });
}

function renderCategorias() {
  const {key}=getMesAno(mesOffset);
  const items=getLancamentos().filter(l=>l.data&&l.data.startsWith(key));
  function buildCatGrid(tipo,elId){
    const cats=tipo==='despesa'?CATS_DESPESA:CATS_RECEITA;
    const por={};
    items.filter(l=>l.tipo===tipo).forEach(l=>{por[l.cat]=(por[l.cat]||0)+l.valor;});
    const max=Math.max(...Object.values(por),1);
    const el=document.getElementById(elId);
    const entries=cats.filter(c=>por[c]).sort((a,b)=>por[b]-por[a]);
    if(!entries.length){el.innerHTML='<span style="font-size:13px;color:var(--text3)">Sem lançamentos</span>';return;}
    el.innerHTML=entries.map(c=>`
      <div class="cat-row">
        <div class="cat-name">${c}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.round(por[c]/max*100)}%;background:${CORES[c]||'#888'}"></div></div>
        <div class="cat-val">${fmtMoeda(por[c])}</div>
      </div>
    `).join('');
  }
  buildCatGrid('despesa','catGridDespesa');
  buildCatGrid('receita','catGridReceita');
}

document.getElementById('inputData').valueAsDate=new Date();
preencherFiltrosCat();
setTipo('despesa');
atualizarTudo();
</script>
